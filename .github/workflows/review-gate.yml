name: Review findings gate

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, edited]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  schedule:
    - cron: "23 4 * * *"

permissions: {}

jobs:
  select-pull-requests:
    name: Select pull requests
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'pull_request_target' ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      pull_requests: ${{ steps.targets.outputs.pull_requests }}
      has_targets: ${{ steps.targets.outputs.has_targets }}

    steps:
      - name: Select current pull requests
        id: targets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "schedule" ]; then
            pull_requests="$(gh pr list --repo "${GITHUB_REPOSITORY}" --state open --limit 1000 --json number --jq '[.[].number]')"
          else
            if [[ ! "${PR_NUMBER}" =~ ^[1-9][0-9]*$ ]]; then
              echo "Could not determine pull request number." >&2
              exit 1
            fi
            pull_requests="[${PR_NUMBER}]"
          fi

          echo "pull_requests=${pull_requests}" >> "${GITHUB_OUTPUT}"
          if [ "${pull_requests}" = "[]" ]; then
            echo "has_targets=false" >> "${GITHUB_OUTPUT}"
          else
            echo "has_targets=true" >> "${GITHUB_OUTPUT}"
          fi

  review-gate:
    name: Review gate status sync
    needs: select-pull-requests
    if: needs.select-pull-requests.outputs.has_targets == 'true'
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        pr: ${{ fromJSON(needs.select-pull-requests.outputs.pull_requests) }}
    concurrency:
      group: review-gate-${{ github.workflow }}-${{ matrix.pr }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Sync current-head review status
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ matrix.pr }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ ! -f scripts/sync-review-gate-status.mjs ]; then
            echo "Review gate scripts are not present on the trusted default branch yet; skipping bootstrap event."
            exit 0
          fi

          args=(
            --repo "${GITHUB_REPOSITORY}"
            --run-url "${RUN_URL}"
            --strict-head-review
            --wait-head-review-ms 0
            --allow-missing-head-review
            --required-review-author chatgpt-codex-connector
          )

          args+=(--pr "${PR_NUMBER}")
          if [ "${EVENT_NAME}" = "schedule" ]; then
            args+=(--skip-pending-status)
          fi

          node scripts/sync-review-gate-status.mjs "${args[@]}"
