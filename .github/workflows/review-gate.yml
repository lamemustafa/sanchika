name: Review findings gate

on:
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number to check
        required: false
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, edited]
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: review-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.inputs.pr || github.ref }}
  cancel-in-progress: true

jobs:
  review-gate:
    name: Review gate
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.repository.default_branch }}
          persist-credentials: false

      - name: Sync current-head review status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          args=(
            --repo "${GITHUB_REPOSITORY}"
            --run-url "${RUN_URL}"
            --strict-head-review
            --required-review-author chatgpt-codex-connector
          )

          if [ "${EVENT_NAME}" = "schedule" ]; then
            args+=(--all-open --wait-head-review-ms 0 --skip-pending-status)
          else
            if [ -z "${PR_NUMBER}" ]; then
              echo "Could not determine pull request number." >&2
              exit 1
            fi
            args+=(--pr "${PR_NUMBER}" --wait-head-review-ms 180000 --allow-missing-head-review)
          fi

          node scripts/sync-review-gate-status.mjs "${args[@]}"
