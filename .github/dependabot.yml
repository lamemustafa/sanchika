version: 2
multi-ecosystem-groups:
  sanchika-dependency-hygiene:
    schedule:
      interval: monthly
updates:
  - package-ecosystem: npm
    directory: /
    multi-ecosystem-group: sanchika-dependency-hygiene
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: /
    multi-ecosystem-group: sanchika-dependency-hygiene
    open-pull-requests-limit: 5
