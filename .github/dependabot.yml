version: 2
multi-ecosystem-groups:
  sanchika-dependency-hygiene:
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
updates:
  - package-ecosystem: npm
    directory: /
    patterns:
      - "*"
    multi-ecosystem-group: sanchika-dependency-hygiene
  - package-ecosystem: github-actions
    directory: /
    patterns:
      - "*"
    multi-ecosystem-group: sanchika-dependency-hygiene
